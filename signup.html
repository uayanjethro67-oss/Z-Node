<!DOCTYPE html>
<html class="light scroll-smooth" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Get Started - Z-Node</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e3e2e6",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#001b3c",
                        "on-secondary-fixed-variant": "#3e4758",
                        "on-primary-fixed-variant": "#2d476f",
                        "surface-bright": "#faf9fd",
                        "error-container": "#ffdad6",
                        "primary-container": "#1a365d",
                        "primary": "#002045",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#faf9fd",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e9e7eb",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#86a0cd",
                        "on-surface-variant": "#43474e",
                        "on-secondary-fixed": "#121c2b",
                        "surface-variant": "#e3e2e6",
                        "surface-dim": "#dad9dd",
                        "outline-variant": "#c4c6cf",
                        "tertiary-fixed": "#9ff5c1",
                        "on-background": "#1a1c1e",
                        "on-surface": "#1a1c1e",
                        "secondary-fixed": "#d9e3f8",
                        "secondary-fixed-dim": "#bdc7db",
                        "secondary-container": "#d9e3f8",
                        "tertiary-container": "#003f25",
                        "secondary": "#555f70",
                        "inverse-surface": "#2f3033",
                        "on-tertiary-fixed": "#002111",
                        "on-tertiary-container": "#5caf81",
                        "tertiary": "#002715",
                        "on-error-container": "#93000a",
                        "background": "#faf9fd",
                        "on-secondary-container": "#5b6577",
                        "surface-tint": "#455f88",
                        "outline": "#74777f",
                        "surface-container-low": "#f4f3f7",
                        "tertiary-fixed-dim": "#83d8a6",
                        "inverse-primary": "#adc7f7",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#d6e3ff",
                        "inverse-on-surface": "#f1f0f4",
                        "primary-fixed-dim": "#adc7f7",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#005231",
                        "surface-container": "#efedf1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
    <nav class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto border-b-0">
            <a href="index.html" class="text-2xl font-bold tracking-tighter text-blue-950 dark:text-blue-50">Z-Node</a>
            <div class="flex items-center gap-4">
                <a href="login.html" class="text-slate-600 dark:text-slate-400 font-medium hover:text-blue-950 dark:hover:text-white">Login</a>
                <a href="signup.html" class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-6 py-2 rounded-full font-semibold scale-95 active:scale-100 transition-transform duration-200">Get Started</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-24 pb-16 flex items-center justify-center">
        <div class="w-full max-w-2xl px-4">
            <div class="bg-surface-container-lowest p-8 rounded-2xl shadow-lg ring-1 ring-outline-variant/15">
                <div class="text-center mb-8">
                    <h1 class="text-[2rem] font-bold text-primary mb-2">Create Your Account</h1>
                    <p class="text-on-surface-variant">Join Z-Node and start managing attendance with confidence</p>
                </div>

                <form id="signupForm" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-on-surface mb-2">First Name</label>
                            <input 
                                type="text" 
                                name="firstName" 
                                required
                                class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface placeholder-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                                placeholder="John"
                            />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-on-surface mb-2">Last Name</label>
                            <input 
                                type="text" 
                                name="lastName" 
                                required
                                class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface placeholder-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                                placeholder="Doe"
                            />
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-on-surface mb-2">Institution/School Name</label>
                        <input 
                            type="text" 
                            name="institution" 
                            required
                            class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface placeholder-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                            placeholder="Your school or organization"
                        />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-on-surface mb-2">Email Address</label>
                        <input 
                            type="email" 
                            name="email" 
                            required
                            class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface placeholder-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                            placeholder="you@example.com"
                        />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-on-surface mb-2">Password</label>
                        <input 
                            type="password" 
                            name="password" 
                            required
                            class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface placeholder-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                            placeholder="••••••••"
                        />
                        <p class="text-xs text-on-surface-variant mt-2">Minimum 8 characters</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-on-surface mb-2">Confirm Password</label>
                        <input 
                            type="password" 
                            name="confirmPassword" 
                            required
                            class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface placeholder-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                            placeholder="••••••••"
                        />
                    </div>

                    <div class="flex items-start gap-3">
                        <input type="checkbox" name="terms" required class="w-4 h-4 rounded border-outline-variant mt-1">
                        <label class="text-sm text-on-surface-variant">
                            I agree to the 
                            <a href="#" class="text-primary hover:text-primary-container transition">Terms of Service</a> and 
                            <a href="#" class="text-primary hover:text-primary-container transition">Privacy Policy</a>
                        </label>
                    </div>

                    <button 
                        type="submit"
                        class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-3 rounded-lg font-semibold hover:shadow-lg hover:shadow-primary/20 transition-all active:scale-95"
                    >
                        Create Account
                    </button>
                </form>

                <div class="mt-6 pt-6 border-t border-outline-variant/30">
                    <p class="text-center text-on-surface-variant">
                        Already have an account? 
                        <a href="login.html" class="text-primary font-semibold hover:text-primary-container transition">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full pt-16 pb-8 bg-blue-950 dark:bg-black text-slate-300 dark:text-slate-500 text-sm font-inter leading-relaxed">
        <div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-start gap-8">
            <div class="flex flex-col">
                <div class="text-xl font-bold text-white mb-4">Z-Node</div>
                <p>© 2024 Z-Node. Built for Architectural Clarity in Education.</p>
            </div>
            <div class="flex flex-wrap gap-6">
                <a class="text-slate-400 hover:text-white transition-colors hover:text-emerald-300 opacity-80 hover:opacity-100 transition-opacity" href="#">Privacy Policy</a>
                <a class="text-slate-400 hover:text-white transition-colors hover:text-emerald-300 opacity-80 hover:opacity-100 transition-opacity" href="#">Terms of Service</a>
                <a class="text-slate-400 hover:text-white transition-colors hover:text-emerald-300 opacity-80 hover:opacity-100 transition-opacity" href="#">Security Whitepaper</a>
                <a class="text-slate-400 hover:text-white transition-colors hover:text-emerald-300 opacity-80 hover:opacity-100 transition-opacity" href="#">Contact Support</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = this.querySelector('input[name="password"]').value;
            const confirmPassword = this.querySelector('input[name="confirmPassword"]').value;
            const firstName = this.querySelector('input[name="firstName"]').value;
            
            if (password.length < 8) {
                alert('Password must be at least 8 characters long');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            // Basic validation passed
            alert('Account created successfully! Welcome, ' + firstName + '. You can now log in.');
            // In a real app, you would send this to a backend
        });
    </script>
</body>
</html>
